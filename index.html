<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global/global.css">
    <link rel="stylesheet" href="assets/icons/css/all.css">
    
    <script src="js/jquery.min.js"></script>
    <script src="js/defaullt.min.js"></script>
    <title>Márcio Fernando</title>
</head>
<body>
    <div class="loadPag">
        <div class="loadBox">
            <div class="logotipo"></div>
            <span class="slogan"></span>
            <div class="progress"></div>
        </div>
    </div>

    <div class="gridBox j-center">
        <div class="viewBox">
            <div class="layoutBox">
                <header class="heaBox">
                    <div class="logo"><img src="assets/imgs/MeLogDef.png" alt=""></div>
                    <div class="mail">
                        <span class="label">feedback</span>
                        <span class="email">meires.fernando@gmail.com</span>
                    </div>
                </header>

                <div class="navigateBox">
                    <div class="sidebar">
                        <div class="router">
                            <label for="home">overview</label>
                            <div class="own"><i class="fa fa-expand"></i></div>
                        </div>
                        <div class="router">
                            <label for="about">sobre</label>
                            <div class="radio"><i class="fa fa-circle"></i></div>
                        </div>
                        <div class="router">
                            <label for="folio">folio</label>
                            <div class="radio"><i class="fa fa-circle"></i></div>
                        </div>
                        <div class="router">
                            <label for="contact">contactos</label>
                            <div class="radio"><i class="fa fa-circle"></i></div>
                        </div>
                    </div>
                </div>
            </div>

            <section class="section">
                <div class="home" id="home"></div>
                <div class="about" id="about"></div>
                <div class="folio" id="folio"></div>
                <div class="contact" id="contact"></div>
            </section>
        </div>
    </div>
</body>
</html>
